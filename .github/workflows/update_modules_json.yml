name: Update modules index

on:
  push:
    paths:
      - '**/config.ini'
      - '**/lang/**/desc.ini'
      - '**/*.png'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run indexer
        run: python update_modules_json.py

      - name: Commit updated modules.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add modules.json
          git diff --cached --quiet || git commit -m "chore: update modules.json [skip ci]"
          git push
